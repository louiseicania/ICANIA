<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Icania — share card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#0c0c0c;display:flex;justify-content:center;align-items:center;min-height:100vh;}
  #card{display:block;width:1000px;height:525px;box-shadow:0 20px 80px rgba(0,0,0,0.5);}
</style>
</head>
<body>
<canvas id="card"></canvas>
<script>
const BLUSH = '#F6F3F4';
const NAVY  = '#1F2540';
const MUTED = 'rgba(31,37,64,0.58)';

// ---- HD canvas: logical 1200x630, backing store scaled up ----
const W = 1200, H = 630, SCALE = 2;
const c = document.getElementById('card');
const x = c.getContext('2d');
c.width = W * SCALE;
c.height = H * SCALE;
x.scale(SCALE, SCALE);
x.imageSmoothingEnabled = true;
x.imageSmoothingQuality = 'high';

const fairy = new Image();
let fairyReady = false;
fairy.onload = () => { fairyReady = true; render(); };
fairy.src = '/fairy-mark.png';

// ---- layout constants (logical 1200x630) ----
// Fairy: flying, left, top wing cropped by the top edge.
const FAIRY = { h: 715, x: 66, y: -34 };

// Wordmark block, centred on WM_X, sitting right of the fairy.
const WM_X    = 583;
const WM_BASE = 392;   // "Icania." baseline
const WM_SIZE = 52;
const WM_RULE = 408;   // underline y
const SUB_BASE = 438;  // subline baseline
const SUB_SIZE = 30;

// Process poem, upper right, alternating left / indented stagger.
const POEM_L = 737, POEM_R = 838, POEM_SIZE = 36;
const POEM = [
  ['I collect.',    POEM_L, 172],
  ['I photograph.', POEM_R, 210],
  ['I publish.',    POEM_L, 248],
  ['Clothes sell.', POEM_R, 286],
  ['I ship.',       POEM_L, 326],
  ['We split.',     POEM_R, 364],
];

// Two footer columns, left aligned.
const FOOT_SIZE = 19, FOOT_Y1 = 561, FOOT_Y2 = 593;
const SOC_X = 259, REV_X = 606;

function render(){
  x.fillStyle = BLUSH;
  x.fillRect(0, 0, W, H);

  // fairy, natural navy line art
  if (fairyReady){
    const fw = FAIRY.h * (fairy.width / fairy.height);
    x.drawImage(fairy, FAIRY.x, FAIRY.y, fw, FAIRY.h);
  }

  x.fillStyle = NAVY;

  // ---- process poem ----
  x.textAlign = 'left';
  x.textBaseline = 'alphabetic';
  x.font = '400 ' + POEM_SIZE + 'px "Cormorant Garamond"';
  for (const [line, lx, ly] of POEM) x.fillText(line, lx, ly);

  // ---- wordmark + underline + subline ----
  x.textAlign = 'center';
  x.font = '500 ' + WM_SIZE + 'px "Cormorant Garamond"';
  x.fillText('Icania.', WM_X, WM_BASE);
  const wmW = x.measureText('Icania.').width;
  x.strokeStyle = NAVY;
  x.lineWidth = 1.6;
  x.beginPath();
  x.moveTo(WM_X - wmW / 2, WM_RULE);
  x.lineTo(WM_X + wmW / 2, WM_RULE);
  x.stroke();

  x.font = 'italic 400 ' + SUB_SIZE + 'px "Cormorant Garamond"';
  x.fillText('Vinted Reselling Service', WM_X, SUB_BASE);

  // ---- footer: socials (left col) + reviews (mid col) ----
  x.fillStyle = MUTED;
  x.textAlign = 'center';
  x.font = '400 ' + FOOT_SIZE + 'px "Cormorant Garamond"';
  x.fillText('@__icaniaa__ on Instagram  ·  @_icaniaa_ on TikTok  ·  650+ 5 star Vinted reviews', 852, 595);

  window.__done = true;
}

window.redraw = render;
window.exportCard = (type) => c.toDataURL(type || 'image/png');

(async () => {
  try {
    await Promise.all([
      document.fonts.load('500 52px "Cormorant Garamond"'),
      document.fonts.load('400 42px "Cormorant Garamond"'),
      document.fonts.load('italic 400 30px "Cormorant Garamond"'),
    ]);
    await document.fonts.ready;
  } catch (e) {}
  render();
})();
render();
</script>
</body>
</html>
